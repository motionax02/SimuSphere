<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimuSphere</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#050e1a;font-family:'Inter',sans-serif;color:#ccdde8;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.bg-glow{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.bg-glow::before{content:'';position:absolute;top:-20%;left:-10%;width:60%;height:60%;background:radial-gradient(ellipse,#003d6622 0%,transparent 70%);animation:drift1 8s ease-in-out infinite alternate;}
.bg-glow::after{content:'';position:absolute;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(ellipse,#00531e22 0%,transparent 70%);animation:drift2 10s ease-in-out infinite alternate;}
@keyframes drift1{from{transform:translate(0,0);}to{transform:translate(4%,3%);}}
@keyframes drift2{from{transform:translate(0,0);}to{transform:translate(-4%,-3%);}}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,120,200,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,120,200,0.04) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;}
.scan-line{position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,#0066cc44 20%,#00aa5044 50%,#0066cc44 80%,transparent 100%);animation:scan 6s linear infinite;pointer-events:none;z-index:99;}
@keyframes scan{0%{top:0;opacity:0.8;}85%{opacity:0.3;}100%{top:100%;opacity:0;}}
.header{position:relative;z-index:2;padding:14px 22px;border-bottom:1px solid #ffffff0d;display:flex;align-items:center;gap:16px;}
.logo-wrap{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.brand{display:flex;flex-direction:column;gap:1px;}
.brand-name{font-family:'Orbitron',monospace;font-size:19px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#4db8ff,#00c853);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.brand-sub{font-size:9px;color:#4a7a9a;letter-spacing:3px;}
.sep{width:1px;height:38px;background:linear-gradient(to bottom,transparent,#ffffff15,transparent);flex-shrink:0;}
.header-mid{flex:1;}
.comp-box{flex-shrink:0;text-align:right;}
.comp-label{font-size:8px;color:#4a7a9a;letter-spacing:2px;margin-bottom:3px;}
.comp-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#4db8ff;letter-spacing:1px;}
.messages{flex:1;overflow-y:auto;padding:16px 22px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:2;scrollbar-width:thin;scrollbar-color:#ffffff10 transparent;}
.msg{display:flex;gap:10px;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.user{flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'Orbitron',monospace;}
.av.ai{background:linear-gradient(135deg,#003366,#004d1a);border:1px solid #4db8ff55;}
.av.usr{background:linear-gradient(135deg,#1a0f00,#0f1a00);border:1px solid #f5a62355;color:#f5a623;}
.bbl{max-width:76%;padding:10px 14px;font-size:12px;line-height:1.7;font-weight:300;}
.msg.ai .bbl{background:linear-gradient(135deg,#0a1f33,#0a1f14);border:1px solid #ffffff0f;border-radius:2px 10px 10px 10px;color:#c8dde8;}
.msg.user .bbl{background:linear-gradient(135deg,#1a1400,#0f1a00);border:1px solid #f5a62322;border-radius:10px 2px 10px 10px;color:#f0d090;}
.msg-meta{font-size:8px;color:#2a4a5a;margin-top:4px;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.msg.user .msg-meta{justify-content:flex-end;}
.speak-btn{background:transparent;border:none;cursor:pointer;padding:0;display:flex;align-items:center;opacity:0.4;transition:opacity 0.2s;}
.speak-btn:hover{opacity:1;}
.speak-btn.speaking{opacity:1;}
.speak-btn svg{width:12px;height:12px;fill:none;stroke:#4db8ff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.speak-btn.speaking svg{stroke:#00c853;}
.typing{display:none;align-items:center;gap:8px;}
.typing.active{display:flex;}
.tdots span{display:inline-block;width:4px;height:4px;border-radius:50%;margin:0 2px;animation:tdot 1.4s ease-in-out infinite;}
.tdots span:nth-child(1){background:#4db8ff;animation-delay:0s;}
.tdots span:nth-child(2){background:#22dd88;animation-delay:0.2s;}
.tdots span:nth-child(3){background:#4db8ff;animation-delay:0.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:0.3;}30%{transform:translateY(-5px);opacity:1;}}
.quick-row{padding:0 22px 12px;display:flex;gap:7px;flex-wrap:wrap;position:relative;z-index:2;min-height:0;}
.qb{background:transparent;border:1px solid #ffffff0f;border-radius:6px;padding:5px 13px;font-size:10px;color:#5a8aaa;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;letter-spacing:0.3px;}
.qb:hover{border-color:#4db8ff33;color:#4db8ff;background:#4db8ff08;}
.input-row{padding:12px 22px;border-top:1px solid #ffffff08;display:flex;gap:8px;align-items:flex-end;position:relative;z-index:2;}
textarea{flex:1;background:#0a1a2a;border:1px solid #ffffff0f;border-radius:8px;padding:10px 14px;color:#c8dde8;font-family:'Inter',sans-serif;font-size:12px;font-weight:300;resize:none;outline:none;min-height:42px;max-height:80px;transition:border-color 0.2s;}
textarea:focus{border-color:#4db8ff33;}
textarea::placeholder{color:#2a4a5a;}
.sbtn{width:42px;height:42px;border-radius:8px;background:linear-gradient(135deg,#0055aa,#007733);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.sbtn:hover{background:linear-gradient(135deg,#0066cc,#009944);transform:scale(1.04);}
.sbtn:disabled{background:#0a1a2a;cursor:not-allowed;transform:none;}
.sbtn svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.mic-btn{width:42px;height:42px;border-radius:8px;background:#0a1a2a;border:1px solid #ffffff0f;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.mic-btn:hover{border-color:#4db8ff33;}
.mic-btn.listening{background:#cc000022;border-color:#cc0000aa;animation:pulse-mic 1s ease-in-out infinite;}
.mic-btn.listening svg{stroke:#ff4444;}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 #cc000033;}50%{box-shadow:0 0 0 6px #cc000000;}}
.mic-btn svg{width:16px;height:16px;fill:none;stroke:#5a8aaa;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s;}
.voice-status{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0a1a2aee;border:1px solid #4db8ff33;border-radius:12px;padding:20px 30px;text-align:center;font-size:12px;color:#4db8ff;letter-spacing:1px;z-index:100;display:none;backdrop-filter:blur(10px);}
.voice-status.show{display:block;}
.voice-status .vs-dots{margin-top:10px;}
.voice-status .vs-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4db8ff;margin:0 3px;animation:tdot 1.4s ease-in-out infinite;}
.voice-status .vs-dots span:nth-child(2){animation-delay:0.2s;}
.voice-status .vs-dots span:nth-child(3){animation-delay:0.4s;}
.footer{padding:7px 22px;border-top:1px solid #ffffff06;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;}
.footer-l{font-size:8px;color:#1a3a4a;letter-spacing:1.5px;}
.footer-r{font-size:8px;color:#2a5a4a;letter-spacing:1px;font-family:'Orbitron',monospace;}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="grid-bg"></div>
<div class="scan-line"></div>
<div class="header">
  <div class="logo-wrap">
    <canvas id="lc" width="42" height="42"></canvas>
    <div class="brand">
      <div class="brand-name">SimuSphere</div>
      <div class="brand-sub">NEW LEARNING METHOD</div>
    </div>
  </div>
  <div class="sep"></div>
  <div class="header-mid"></div>
  <div class="comp-box">
    <div class="comp-label">CURRENTLY VIEWING</div>
    <div class="comp-name" id="compName">—</div>
  </div>
</div>
<div class="messages" id="msgs">
  <div class="msg ai">
    <div class="av ai"><canvas id="avc" width="30" height="30"></canvas></div>
    <div>
      <div class="bbl">Welcome. You are viewing <span style="color:#4db8ff;font-weight:500" id="compSpan">this component</span>. What would you like to know?</div>
      <div class="msg-meta">AI SIMUSPHERE
        <button class="speak-btn" onclick="speakText(this)" data-text="Welcome. What would you like to know?">
          <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="typing" id="typing">
    <div class="av ai" style="font-size:9px;color:#4db8ff;">AI</div>
    <div>
      <div class="tdots"><span></span><span></span><span></span></div>
      <div style="font-size:8px;color:#2a4a5a;margin-top:4px;letter-spacing:1px;">ANALYZING...</div>
    </div>
  </div>
</div>
<div class="quick-row" id="quickRow"></div>
<div class="input-row">
  <textarea id="inp" placeholder="Ask about this component..." rows="1"></textarea>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice input">
    <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
  </button>
  <button class="sbtn" id="sendBtn" onclick="send()">
    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>
<div class="voice-status" id="voiceStatus">
  <div id="vsText">LISTENING...</div>
  <div class="vs-dots"><span></span><span></span><span></span></div>
</div>
<div class="footer">
  <span class="footer-l">CENTRAL GHAWAR PRODUCING DEPARTMENT</span>
  <span class="footer-r">© Ammar Al-Shuhiyb · VIS-7</span>
</div>
<script>
const params=new URLSearchParams(window.location.search);
const component=params.get('component')||'Component';
document.getElementById('compName').textContent=component.toUpperCase();
document.getElementById('compSpan').textContent=component;

async function loadQuickButtons(){
  const row=document.getElementById('quickRow');
  try{
    const r=await fetch('/component/'+encodeURIComponent(component));
    const data=await r.json();
    const btns=data.buttons||[];
    if(btns.length===0){row.innerHTML='';return;}
    row.innerHTML=btns.map(b=>`<button class="qb" onclick="sendQ('${b.question.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">${b.label}</button>`).join('');
  }catch(e){row.innerHTML='';}
}
loadQuickButtons();

// TTS
let currentSpeakBtn=null;
let cachedVoice=null;
function getMaleVoice(){
  const voices=window.speechSynthesis.getVoices();
  if(cachedVoice)return cachedVoice;
  cachedVoice=voices.find(v=>/david|mark|fred|ralph|albert/i.test(v.name))||
    voices.find(v=>v.name.includes('Microsoft David'))||
    voices.find(v=>v.gender==='male')||
    voices.find(v=>v.lang==='en-US'&&/man|male|guy/i.test(v.name))||
    voices.find(v=>v.lang==='en-US'&&v.name.includes('Daniel'))||
    voices.find(v=>v.lang==='en-US')||voices[0]||null;
  return cachedVoice;
}
window.speechSynthesis.onvoiceschanged=()=>{cachedVoice=null;getMaleVoice();};
function speakAI(text,btn){
  if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();}
  if(currentSpeakBtn){currentSpeakBtn.classList.remove('speaking');currentSpeakBtn=null;}
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='en-US';utt.rate=0.95;
  const voice=getMaleVoice();if(voice)utt.voice=voice;
  utt.onend=()=>{if(btn){btn.classList.remove('speaking');}currentSpeakBtn=null;};
  utt.onerror=()=>{if(btn){btn.classList.remove('speaking');}currentSpeakBtn=null;};
  if(btn){currentSpeakBtn=btn;btn.classList.add('speaking');}
  window.speechSynthesis.speak(utt);
}
function speakText(btn){
  const text=btn.getAttribute('data-text');
  if(window.speechSynthesis.speaking&&currentSpeakBtn===btn){
    window.speechSynthesis.cancel();
    btn.classList.remove('speaking');currentSpeakBtn=null;return;
  }
  speakAI(text,btn);
}

// Voice input
let recognition=null;
let isListening=false;
function initRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.lang='en-US';r.interimResults=false;r.maxAlternatives=1;
  r.onresult=e=>{
    const text=e.results[0][0].transcript;
    stopListening();
    if(text.trim()){document.getElementById('inp').value=text;send();}
  };
  r.onerror=e=>{
    stopListening();
    if(e.error==='no-speech') showVoiceStatus('No speech detected — tap 🎤 to retry',1500);
  };
  r.onend=()=>{if(isListening)stopListening();};
  return r;
}
function toggleMic(){if(isListening){stopListening();return;}startListening();}
function startListening(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showVoiceStatus('Voice not supported on this browser',1500);return;}
  recognition=initRecognition();recognition.start();isListening=true;
  document.getElementById('micBtn').classList.add('listening');
  showVoiceStatus('LISTENING...',0);
}
function stopListening(){
  isListening=false;
  if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
  document.getElementById('micBtn').classList.remove('listening');
  hideVoiceStatus();
}
function showVoiceStatus(msg,duration){
  const vs=document.getElementById('voiceStatus');
  document.getElementById('vsText').textContent=msg;vs.classList.add('show');
  if(duration>0)setTimeout(hideVoiceStatus,duration);
}
function hideVoiceStatus(){document.getElementById('voiceStatus').classList.remove('show');}

function drawOrb(canvas,size,speed){
  const ctx=canvas.getContext('2d');let a=0,pulse=0;
  function draw(){
    ctx.clearRect(0,0,size,size);
    const cx=size/2,cy=size/2,r=size/2-2;
    pulse+=0.04;const glow=Math.sin(pulse)*0.15+0.25;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(77,184,255,'+(glow+0.1)+')';ctx.lineWidth=1;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(a);
    const colors=['#4db8ff','#00c853','#4db8ff','#22aaff'];
    for(let i=0;i<4;i++){
      ctx.save();ctx.rotate(i*Math.PI/2);
      ctx.beginPath();ctx.moveTo(0,-(r-1));ctx.lineTo(3,-(r-6));ctx.lineTo(-3,-(r-6));ctx.closePath();
      ctx.fillStyle=colors[i];ctx.fill();ctx.restore();
    }
    ctx.beginPath();ctx.arc(0,0,size*0.14,0,Math.PI*2);
    const g=ctx.createRadialGradient(0,0,0,0,0,size*0.14);
    g.addColorStop(0,'#4db8ff');g.addColorStop(1,'#00c853');
    ctx.fillStyle=g;ctx.fill();
    ctx.restore();a+=speed;requestAnimationFrame(draw);
  }draw();
}
drawOrb(document.getElementById('lc'),42,0.006);
drawOrb(document.getElementById('avc'),30,0.01);

function getTime(){return new Date().toTimeString().slice(0,8);}
function addMsg(role,text){
  const msgs=document.getElementById('msgs');
  const typing=document.getElementById('typing');
  const div=document.createElement('div');div.className='msg '+role;
  const isAI=role==='ai';
  const speakBtnHTML=isAI?`<button class="speak-btn" onclick="speakText(this)" data-text="${text.replace(/"/g,'&quot;')}"><svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></button>`:'';
  div.innerHTML='<div class="av '+(isAI?'ai':'usr')+'">'+(isAI?'<canvas width="30" height="30"></canvas>':'YOU')+'</div><div><div class="bbl">'+text+'</div><div class="msg-meta">'+(isAI?'SIMUSPHERE AI':'INSPECTOR')+' · '+getTime()+speakBtnHTML+'</div></div>';
  msgs.insertBefore(div,typing);
  if(isAI){const c=div.querySelector('canvas');if(c)drawOrb(c,30,0.01);const sb=div.querySelector('.speak-btn');if(sb)setTimeout(()=>speakAI(text,sb),300);}
  msgs.scrollTop=msgs.scrollHeight;
}
function setTyping(on){document.getElementById('typing').className='typing'+(on?' active':'');document.getElementById('msgs').scrollTop=99999;}
async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();if(currentSpeakBtn){currentSpeakBtn.classList.remove('speaking');currentSpeakBtn=null;}}
  addMsg('user',text);setTyping(true);
  try{
    const res=await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:text,component})});
    const data=await res.json();setTyping(false);addMsg('ai',data.answer);
  }catch(e){setTyping(false);addMsg('ai','Connection error. Please retry.');}
  document.getElementById('sendBtn').disabled=false;
}
function sendQ(q){document.getElementById('inp').value=q;send();}
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById('inp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px';});
</script>
</body>
</html>
