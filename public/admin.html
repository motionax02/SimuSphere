<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimuSphere Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#070f1a;color:#c8dde8;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;}
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;}
.login-box{background:#0d1e30;border:1px solid #ffffff10;border-radius:12px;padding:40px;width:340px;text-align:center;}
.login-box h2{font-size:18px;letter-spacing:3px;color:#4db8ff;margin-bottom:6px;}
.login-box p{font-size:11px;color:#4a7a9a;margin-bottom:28px;letter-spacing:1px;}
.login-box input{width:100%;padding:12px 16px;background:#0a1624;border:1px solid #ffffff15;border-radius:8px;color:#c8dde8;font-size:13px;outline:none;margin-bottom:14px;}
.login-box input:focus{border-color:#4db8ff44;}
.login-box button{width:100%;padding:12px;background:linear-gradient(135deg,#0055aa,#007733);border:none;border-radius:8px;color:#fff;font-size:13px;letter-spacing:1px;cursor:pointer;}
.login-err{color:#e74c3c;font-size:11px;margin-top:10px;min-height:16px;}
#adminApp{display:none;}
.topbar{background:#0d1e30;border-bottom:1px solid #ffffff0d;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:15px;font-weight:700;letter-spacing:2px;color:#4db8ff;}
.topbar-sub{font-size:10px;color:#4a7a9a;letter-spacing:1px;margin-top:2px;}
.logout-btn{background:transparent;border:1px solid #ffffff15;color:#5a8aaa;padding:6px 14px;border-radius:6px;font-size:11px;cursor:pointer;}
.logout-btn:hover{border-color:#e74c3c44;color:#e74c3c;}
.container{max-width:860px;margin:0 auto;padding:28px 20px;}
.section{background:#0d1e30;border:1px solid #ffffff0d;border-radius:10px;padding:24px;margin-bottom:20px;}
.section-title{font-size:12px;letter-spacing:2px;color:#4db8ff;font-weight:600;margin-bottom:18px;text-transform:uppercase;}
label{display:block;font-size:10px;letter-spacing:1.5px;color:#4a7a9a;margin-bottom:6px;margin-top:14px;}
label:first-of-type{margin-top:0;}
input[type=text],input[type=password],textarea{width:100%;padding:10px 14px;background:#060e18;border:1px solid #ffffff0d;border-radius:7px;color:#c8dde8;font-size:12px;font-family:inherit;outline:none;transition:border-color 0.2s;}
input[type=text]:focus,input[type=password]:focus,textarea:focus{border-color:#4db8ff33;}
textarea{resize:vertical;min-height:80px;line-height:1.6;}
.list-field{background:#060e18;border:1px solid #ffffff0d;border-radius:7px;padding:10px;}
.list-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.list-item input{flex:1;margin:0;}
.list-item .sep-label{font-size:10px;color:#2a4a5a;flex-shrink:0;}
.rm-btn{width:28px;height:28px;background:transparent;border:1px solid #ffffff10;border-radius:5px;color:#5a7a8a;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.rm-btn:hover{border-color:#e74c3c44;color:#e74c3c;}
.add-item-btn{background:transparent;border:1px dashed #ffffff15;border-radius:6px;color:#4a7a9a;padding:7px 14px;font-size:11px;cursor:pointer;width:100%;margin-top:6px;letter-spacing:1px;}
.add-item-btn:hover{border-color:#4db8ff44;color:#4db8ff;}
.btn-row{display:flex;gap:10px;margin-top:20px;}
.save-btn{background:linear-gradient(135deg,#0055aa,#007733);border:none;border-radius:7px;color:#fff;padding:10px 24px;font-size:12px;letter-spacing:1px;cursor:pointer;flex:1;}
.save-btn:hover{opacity:0.9;}
.clear-btn{background:transparent;border:1px solid #ffffff10;border-radius:7px;color:#5a7a8a;padding:10px 20px;font-size:12px;cursor:pointer;}
.clear-btn:hover{border-color:#ffffff20;color:#8a9ab0;}
.comp-grid{display:flex;flex-direction:column;gap:10px;}
.comp-card{background:#060e18;border:1px solid #ffffff0d;border-radius:8px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.comp-card-name{font-size:13px;font-weight:500;color:#c8dde8;}
.comp-card-meta{font-size:10px;color:#3a6a7a;margin-top:3px;}
.comp-card-actions{display:flex;gap:8px;}
.edit-btn,.del-btn{background:transparent;border:1px solid #ffffff10;border-radius:5px;color:#4a7a9a;padding:5px 12px;font-size:10px;cursor:pointer;letter-spacing:1px;}
.edit-btn:hover{border-color:#4db8ff44;color:#4db8ff;}
.del-btn:hover{border-color:#e74c3c44;color:#e74c3c;}
.empty{color:#2a4a5a;font-size:12px;padding:20px;text-align:center;}
.pass-row{display:flex;gap:10px;align-items:flex-end;}
.pass-row input{flex:1;}
.pass-btn{background:linear-gradient(135deg,#0055aa,#007733);border:none;border-radius:7px;color:#fff;padding:10px 20px;font-size:12px;cursor:pointer;white-space:nowrap;}
.toast{position:fixed;bottom:28px;right:28px;background:#00c85322;border:1px solid #00c85355;color:#00c853;padding:10px 20px;border-radius:8px;font-size:12px;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
.toast.err{background:#e74c3c22;border-color:#e74c3c55;color:#e74c3c;}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-box">
    <h2>SIMUSPHERE</h2>
    <p>ADMIN PANEL · RESTRICTED ACCESS</p>
    <input type="password" id="pwInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">SIGN IN</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>
<div id="adminApp">
  <div class="topbar">
    <div>
      <div class="topbar-title">SIMUSPHERE ADMIN</div>
      <div class="topbar-sub">VESSEL COMPONENT KNOWLEDGE BASE</div>
    </div>
    <button class="logout-btn" onclick="logout()">SIGN OUT</button>
  </div>
  <div class="container">

    <!-- Add/Edit Component -->
    <div class="section">
      <div class="section-title" id="formTitle">Add Component</div>
      <label>COMPONENT NAME</label>
      <input type="text" id="compName" placeholder="e.g. Demister Pad">
      <label>GENERAL KNOWLEDGE <span style="color:#2a4a5a;font-weight:300;">(optional)</span></label>
      <textarea id="compInfo" rows="3" placeholder="Function, common issues, notes..."></textarea>
      <label>INSPECTION CHECKLIST <span style="color:#2a4a5a;font-weight:300;">(optional)</span></label>
      <div class="list-field">
        <div id="checklistItems"></div>
        <button class="add-item-btn" onclick="addListItem('checklistItems','Inspection item...')">+ Add item</button>
      </div>
      <label>SAFETY HAZARDS <span style="color:#2a4a5a;font-weight:300;">(optional)</span></label>
      <div class="list-field">
        <div id="hazardItems"></div>
        <button class="add-item-btn" onclick="addListItem('hazardItems','Safety hazard...')">+ Add hazard</button>
      </div>
      <label>QUICK BUTTONS <span style="color:#2a4a5a;font-weight:300;">(shown on chat screen — label + question)</span></label>
      <div class="list-field">
        <div id="buttonItems"></div>
        <button class="add-item-btn" onclick="addButtonItem()">+ Add button</button>
      </div>
      <div class="btn-row">
        <button class="save-btn" onclick="save()">SAVE COMPONENT</button>
        <button class="clear-btn" onclick="clearForm()">CLEAR</button>
      </div>
    </div>

    <!-- Saved Components -->
    <div class="section">
      <div class="section-title">Saved Components</div>
      <div class="comp-grid" id="compList"><div class="empty">No components yet</div></div>
    </div>

    <!-- Change Password -->
    <div class="section">
      <div class="section-title">Change Admin Password</div>
      <label>NEW PASSWORD <span style="color:#2a4a5a;font-weight:300;">(min 6 characters)</span></label>
      <div class="pass-row">
        <input type="password" id="newPass" placeholder="Enter new password">
        <input type="password" id="confirmPass" placeholder="Confirm new password">
        <button class="pass-btn" onclick="changePassword()">UPDATE</button>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let password='';
function login(){
  const pw=document.getElementById('pwInput').value;
  fetch('/admin/knowledge',{headers:{'x-admin-password':pw}}).then(r=>{
    if(r.status===401){document.getElementById('loginErr').textContent='Incorrect password.';}
    else{password=pw;document.getElementById('loginScreen').style.display='none';document.getElementById('adminApp').style.display='block';loadComponents();}
  });
}
function logout(){
  password='';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('adminApp').style.display='none';
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').textContent='';
}
function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'')+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}
function addListItem(containerId,placeholder,value=''){
  const c=document.getElementById(containerId);
  const d=document.createElement('div');d.className='list-item';
  d.innerHTML=`<input type="text" placeholder="${placeholder}" value="${value.replace(/"/g,'&quot;')}"><button class="rm-btn" onclick="this.parentElement.remove()">×</button>`;
  c.appendChild(d);
}
function addButtonItem(label='',question=''){
  const c=document.getElementById('buttonItems');
  const d=document.createElement('div');d.className='list-item';
  d.innerHTML=`<input type="text" placeholder="Button label" value="${label.replace(/"/g,'&quot;')}" style="flex:0.8"><span class="sep-label">→</span><input type="text" placeholder="Question to send" value="${question.replace(/"/g,'&quot;')}" style="flex:1.2"><button class="rm-btn" onclick="this.parentElement.remove()">×</button>`;
  c.appendChild(d);
}
function getListItems(id){
  return Array.from(document.querySelectorAll('#'+id+' .list-item input')).map(i=>i.value.trim()).filter(Boolean);
}
function getButtonItems(){
  const items=[];
  document.querySelectorAll('#buttonItems .list-item').forEach(row=>{
    const inputs=row.querySelectorAll('input');
    const label=inputs[0]?.value.trim();
    const question=inputs[1]?.value.trim();
    if(label&&question) items.push({label,question});
  });
  return items;
}
function clearForm(){
  document.getElementById('compName').value='';
  document.getElementById('compInfo').value='';
  document.getElementById('checklistItems').innerHTML='';
  document.getElementById('hazardItems').innerHTML='';
  document.getElementById('buttonItems').innerHTML='';
  document.getElementById('formTitle').textContent='Add Component';
}
async function save(){
  const name=document.getElementById('compName').value.trim();
  const info=document.getElementById('compInfo').value.trim();
  const checklist=getListItems('checklistItems');
  const hazards=getListItems('hazardItems');
  const buttons=getButtonItems();
  if(!name){showToast('Component name required',true);return;}
  await fetch('/admin/knowledge',{method:'POST',headers:{'Content-Type':'application/json','x-admin-password':password},body:JSON.stringify({name,info,checklist,hazards,buttons})});
  showToast('✓ Saved successfully');
  clearForm();loadComponents();
}
async function loadComponents(){
  const r=await fetch('/admin/knowledge',{headers:{'x-admin-password':password}});
  const data=await r.json();
  const list=document.getElementById('compList');
  const keys=Object.keys(data);
  if(keys.length===0){list.innerHTML='<div class="empty">No components yet</div>';return;}
  list.innerHTML='';
  keys.forEach(k=>{
    const comp=data[k];
    const cl=(comp.checklist||[]).length;
    const hz=(comp.hazards||[]).length;
    const bt=(comp.buttons||[]).length;
    const d=document.createElement('div');d.className='comp-card';
    d.innerHTML=`<div><div class="comp-card-name">${k}</div><div class="comp-card-meta">${cl} checklist · ${hz} hazards · ${bt} button${bt!==1?'s':''}</div></div>
    <div class="comp-card-actions">
      <button class="edit-btn" onclick="editComp('${k.replace(/'/g,"\\'")}')">EDIT</button>
      <button class="del-btn" onclick="delComp('${k.replace(/'/g,"\\'")}')">DELETE</button>
    </div>`;
    list.appendChild(d);
  });
}
async function editComp(name){
  const r=await fetch('/admin/knowledge',{headers:{'x-admin-password':password}});
  const data=await r.json();const comp=data[name]||{};
  document.getElementById('compName').value=name;
  document.getElementById('compInfo').value=comp.info||'';
  document.getElementById('checklistItems').innerHTML='';
  document.getElementById('hazardItems').innerHTML='';
  document.getElementById('buttonItems').innerHTML='';
  (comp.checklist||[]).forEach(v=>addListItem('checklistItems','Inspection item...',v));
  (comp.hazards||[]).forEach(v=>addListItem('hazardItems','Safety hazard...',v));
  (comp.buttons||[]).forEach(b=>addButtonItem(b.label,b.question));
  document.getElementById('formTitle').textContent='Editing: '+name;
  window.scrollTo(0,0);
}
async function delComp(name){
  if(!confirm('Delete "'+name+'"?'))return;
  await fetch('/admin/knowledge/'+encodeURIComponent(name),{method:'DELETE',headers:{'x-admin-password':password}});
  showToast('Deleted');loadComponents();
}
async function changePassword(){
  const np=document.getElementById('newPass').value;
  const cp=document.getElementById('confirmPass').value;
  if(np.length<6){showToast('Password must be at least 6 characters',true);return;}
  if(np!==cp){showToast('Passwords do not match',true);return;}
  const r=await fetch('/admin/change-password',{method:'POST',headers:{'Content-Type':'application/json','x-admin-password':password},body:JSON.stringify({newPassword:np})});
  if(r.ok){
    password=np;
    document.getElementById('newPass').value='';
    document.getElementById('confirmPass').value='';
    showToast('✓ Password updated');
  }else{showToast('Failed to update password',true);}
}
</script>
</body>
</html>
