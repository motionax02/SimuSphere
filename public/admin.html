<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimuSphere Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060f18;--bg2:#0b1a27;--bg3:#0f2030;--bg4:#132638;
  --c1:#00d4ff;--c2:#00ff88;--c3:#7b61ff;--c4:#ff6b6b;
  --t1:#e2eef7;--t2:#7a9ab5;--t3:#3a5a72;
  --b1:rgba(0,212,255,0.07);--b2:rgba(0,212,255,0.18);
}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* Login */
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);}
.login-card{background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:44px 40px;width:360px;text-align:center;}
.login-orb{width:56px;height:56px;border-radius:50%;border:2px solid var(--c1);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:orbPulse 3s ease-in-out infinite;position:relative;}
.login-orb::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid var(--c1);opacity:.2;animation:orbPulse 3s ease-in-out infinite .4s;}
.login-orb-dot{width:14px;height:14px;border-radius:50%;background:var(--c1);animation:dotBreathe 2s ease-in-out infinite;}
@keyframes orbPulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,212,255,.3);}50%{opacity:.6;box-shadow:0 0 0 8px rgba(0,212,255,0);}}
@keyframes dotBreathe{0%,100%{transform:scale(1);}50%{transform:scale(1.25);}}
.login-title{font-size:20px;font-weight:600;letter-spacing:2px;color:var(--t1);margin-bottom:4px;}
.login-sub{font-size:10px;color:var(--t3);letter-spacing:2px;margin-bottom:32px;}
.login-card input{width:100%;padding:12px 16px;background:var(--bg4);border:1px solid var(--b1);border-radius:8px;color:var(--t1);font-size:13px;font-family:'Inter',sans-serif;outline:none;margin-bottom:12px;transition:border-color .2s;}
.login-card input:focus{border-color:rgba(0,212,255,.4);}
.login-btn{width:100%;padding:12px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:8px;color:var(--c1);font-size:12px;letter-spacing:2px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.login-btn:hover{background:rgba(0,212,255,.18);border-color:var(--c1);}
.login-err{color:var(--c4);font-size:11px;margin-top:12px;min-height:16px;}

/* App */
#app{display:none;flex:1;flex-direction:column;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--b1);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-logo{display:flex;align-items:center;gap:8px;}
.tb-orb{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--c1);display:flex;align-items:center;justify-content:center;animation:orbPulse 3s ease-in-out infinite;}
.tb-orb-dot{width:8px;height:8px;border-radius:50%;background:var(--c1);animation:dotBreathe 2s ease-in-out infinite;}
.tb-name{font-size:13px;font-weight:600;letter-spacing:.5px;}
.tb-div{width:1px;height:20px;background:var(--b2);margin:0 4px;}
.tb-page{font-size:13px;color:var(--t2);}
.tb-right{display:flex;align-items:center;gap:8px;}
.live-pill{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.12);font-size:10px;color:var(--c2);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--c2);animation:liveBlink 1.5s ease-in-out infinite;}
@keyframes liveBlink{0%,100%{opacity:1;}50%{opacity:.2;}}
.sign-out{background:transparent;border:1px solid var(--b1);color:var(--t3);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.sign-out:hover{border-color:rgba(255,107,107,.4);color:var(--c4);}

/* Shell */
.shell{display:flex;flex:1;overflow:hidden;}

/* Sidebar */
.sb{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--b1);display:flex;flex-direction:column;padding:12px 8px;}
.sb-sec{font-size:9px;letter-spacing:2px;color:var(--t3);padding:10px 8px 4px;text-transform:uppercase;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:12px;border:1px solid transparent;margin-bottom:1px;transition:all .2s;position:relative;overflow:hidden;background:none;}
.ni::after{content:'';position:absolute;left:0;top:0;width:0;height:100%;background:var(--c1);opacity:.05;transition:width .3s ease;}
.ni:hover::after{width:100%;}
.ni:hover{color:var(--t1);}
.ni.on{background:rgba(0,212,255,.07);color:var(--c1);border-color:rgba(0,212,255,.18);}
.ni.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:18px;background:var(--c1);border-radius:0 2px 2px 0;}
.ni i{font-size:15px;flex-shrink:0;}
.ni-badge{margin-left:auto;font-size:9px;background:rgba(0,255,136,.1);color:var(--c2);padding:1px 6px;border-radius:3px;border:1px solid rgba(0,255,136,.15);font-family:'JetBrains Mono',monospace;}
.sb-spacer{flex:1;}
.sb-status{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:7px;background:rgba(0,255,136,.03);border:1px solid rgba(0,255,136,.08);}
.sb-status-dot{width:5px;height:5px;border-radius:50%;background:var(--c2);animation:liveBlink 1.5s ease-in-out infinite;}
.sb-status-txt{font-size:10px;color:var(--c2);}
.sb-status-url{font-size:9px;color:var(--t3);margin-left:auto;font-family:'JetBrains Mono',monospace;}

/* Content */
.main{flex:1;overflow-y:auto;padding:20px 24px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;}
.page{animation:pageIn .22s ease forwards;}
@keyframes pageIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.sc{background:var(--bg3);border:1px solid var(--b1);border-radius:10px;padding:16px 14px;position:relative;overflow:hidden;transition:border-color .2s;cursor:default;}
.sc:hover{border-color:var(--b2);}
.sc-shimmer{position:absolute;inset:0;opacity:0;transition:opacity .1s;}
.sc:hover .sc-shimmer{animation:shimmer .5s ease;}
@keyframes shimmer{0%{opacity:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%);background-size:200% 100%;background-position:-100% 0;}100%{opacity:1;background-position:100% 0;}}
.sc-n{font-size:28px;font-weight:600;line-height:1.1;font-family:'JetBrains Mono',monospace;}
.sc-l{font-size:9px;color:var(--t3);letter-spacing:.5px;margin-top:6px;text-transform:uppercase;}
.sc-icon{position:absolute;right:12px;top:12px;font-size:22px;opacity:.1;}
.sc.b1 .sc-n,.sc.b1 .sc-icon{color:var(--c1);}
.sc.b2 .sc-n,.sc.b2 .sc-icon{color:var(--c2);}
.sc.b3 .sc-n,.sc.b3 .sc-icon{color:var(--c3);}
.sc.b4 .sc-n,.sc.b4 .sc-icon{color:#ffb347;}

/* Cards */
.g2{display:grid;grid-template-columns:1.3fr 1fr;gap:12px;margin-bottom:12px;}
.card{background:var(--bg3);border:1px solid var(--b1);border-radius:10px;padding:16px;transition:border-color .2s;}
.card:hover{border-color:var(--b2);}
.card-hd{font-size:10px;color:var(--t2);letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;}
.card-hd i{font-size:14px;margin-right:5px;vertical-align:-2px;color:var(--t3);}

/* Bars */
.br{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.br-nm{font-size:11px;color:var(--t2);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.br-tr{flex:1;height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;}
.br-fl{height:100%;border-radius:2px;width:0;transition:width 1.2s cubic-bezier(.16,1,.3,1);}
.br-fl.c{background:var(--c1);}
.br-fl.g{background:var(--c2);}
.br-ct{font-size:10px;color:var(--t3);min-width:22px;text-align:right;font-family:'JetBrains Mono',monospace;}

/* Q items */
.qi{padding:8px 10px;background:var(--bg4);border:1px solid var(--b1);border-radius:7px;margin-bottom:6px;cursor:default;transition:all .2s;}
.qi:hover{border-color:var(--b2);background:var(--bg3);}
.qi-comp{font-size:9px;color:var(--c1);letter-spacing:1px;margin-bottom:2px;}
.qi-text{font-size:11px;color:var(--t2);}
.qi-time{font-size:9px;color:var(--t3);margin-top:2px;font-family:'JetBrains Mono',monospace;}

/* Comp rows */
.cr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg4);border:1px solid var(--b1);border-radius:8px;margin-bottom:6px;transition:all .2s;cursor:default;}
.cr:hover{border-color:var(--b2);background:var(--bg3);}
.cr-name{font-size:13px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:8px;}
.cr-meta{font-size:10px;color:var(--t3);margin-top:3px;}
.pill{font-size:9px;padding:2px 7px;border-radius:3px;}
.pill.kb{background:rgba(255,179,71,.1);color:#ffb347;border:1px solid rgba(255,179,71,.2);}
.pill.gen{background:rgba(0,212,255,.07);color:var(--c1);border:1px solid rgba(0,212,255,.15);}
.cr-acts{display:flex;gap:5px;}
.act{font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--b1);background:transparent;color:var(--t3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.act.e:hover{border-color:rgba(0,212,255,.3);color:var(--c1);}
.act.cp:hover{border-color:rgba(123,97,255,.3);color:var(--c3);}
.act.d:hover{border-color:rgba(255,107,107,.3);color:var(--c4);}

/* Form */
.form-card{background:var(--bg3);border:1px solid var(--b1);border-radius:10px;padding:20px;margin-bottom:12px;}
.form-title{font-size:11px;color:var(--t2);letter-spacing:1px;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.form-title i{font-size:16px;color:var(--c1);}
.fl{display:block;font-size:9px;letter-spacing:1.5px;color:var(--t3);margin-bottom:6px;margin-top:16px;text-transform:uppercase;}
.fl:first-of-type{margin-top:0;}
input[type=text],input[type=password],textarea,select{width:100%;padding:10px 14px;background:var(--bg4);border:1px solid var(--b1);border-radius:7px;color:var(--t1);font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:rgba(0,212,255,.35);}
textarea{resize:vertical;min-height:100px;line-height:1.7;}
select option{background:var(--bg3);}
.char-count{font-size:9px;color:var(--t3);text-align:right;margin-top:3px;font-family:'JetBrains Mono',monospace;}

/* Dynamic list */
.dyn-list{background:var(--bg4);border:1px solid var(--b1);border-radius:7px;padding:10px;}
.dyn-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;animation:fadeSlide .2s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-4px);}to{opacity:1;transform:translateX(0);}}
.dyn-item:last-child{margin-bottom:0;}
.dyn-item input{flex:1;margin:0;}
.dyn-sep{font-size:14px;color:var(--t3);flex-shrink:0;}
.rm-btn{width:26px;height:26px;background:transparent;border:1px solid var(--b1);border-radius:5px;color:var(--t3);cursor:pointer;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.rm-btn:hover{border-color:rgba(255,107,107,.3);color:var(--c4);}
.add-btn{width:100%;margin-top:8px;padding:7px;background:transparent;border:1px dashed var(--b1);border-radius:6px;color:var(--t3);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:.5px;}
.add-btn:hover{border-color:rgba(0,212,255,.3);color:var(--c1);}

/* Toggle */
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg4);border:1px solid var(--b1);border-radius:8px;margin-top:16px;transition:border-color .2s;}
.tog-row:hover{border-color:var(--b2);}
.tog-info .tog-l{font-size:12px;color:var(--t1);}
.tog-info .tog-s{font-size:10px;color:var(--t3);margin-top:2px;}
.tog{position:relative;width:38px;height:21px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;}
.tog-sl{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--b2);border-radius:11px;cursor:pointer;transition:.25s;}
.tog-sl::before{content:'';position:absolute;width:15px;height:15px;left:2px;bottom:2px;background:var(--t3);border-radius:50%;transition:.28s cubic-bezier(.34,1.56,.64,1);}
.tog input:checked+.tog-sl{background:rgba(0,212,255,.15);border-color:var(--c1);}
.tog input:checked+.tog-sl::before{transform:translateX(17px);background:var(--c1);}

/* PDF */
.pdf-zone{border:1.5px dashed var(--b2);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .25s;position:relative;margin-bottom:10px;}
.pdf-zone:hover,.pdf-zone.drag{border-color:var(--c1);background:rgba(0,212,255,.03);}
.pdf-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.pdf-zone:hover .pdf-icon{color:var(--c1);transform:scale(1.1);}
.pdf-icon{font-size:32px;color:var(--t3);display:block;margin-bottom:10px;transition:all .25s;}
.pdf-lbl{font-size:13px;color:var(--t2);margin-bottom:4px;}
.pdf-sub{font-size:10px;color:var(--t3);}
.pdf-prog{display:none;margin-top:12px;}
.pdf-prog.show{display:block;}
.pdf-bar-wrap{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin-top:6px;}
.pdf-bar{height:100%;background:var(--c1);width:0;transition:width .3s ease;border-radius:2px;}
.pdf-status{font-size:10px;color:var(--t2);margin-top:5px;letter-spacing:.5px;}
.pdf-ok{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.15);border-radius:6px;font-size:11px;color:var(--c2);animation:fadeSlide .3s ease;}

/* Buttons row */
.btn-row{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
.pri-btn{padding:10px 22px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:7px;color:var(--c1);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:.5px;}
.pri-btn:hover{background:rgba(0,212,255,.18);border-color:var(--c1);}
.ghost-btn{padding:10px 18px;background:transparent;border:1px solid var(--b1);border-radius:7px;color:var(--t3);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.ghost-btn:hover{border-color:var(--b2);color:var(--t2);}
.danger-btn{padding:10px 18px;background:transparent;border:1px solid rgba(255,107,107,.2);border-radius:7px;color:rgba(255,107,107,.6);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.danger-btn:hover{border-color:var(--c4);color:var(--c4);}

/* Search */
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3);pointer-events:none;}
.search-wrap input{padding-left:34px;}

/* AI settings */
.range-row{display:flex;align-items:center;gap:12px;margin-top:6px;}
.range-row input[type=range]{flex:1;accent-color:var(--c1);}
.range-val{font-size:14px;font-weight:500;color:var(--c1);min-width:40px;font-family:'JetBrains Mono',monospace;}

/* Security */
.sec-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg4);border:1px solid var(--b1);border-radius:8px;margin-bottom:6px;}
.sec-val{font-size:18px;font-weight:500;font-family:'JetBrains Mono',monospace;}

/* Undo */
#undoBar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid rgba(255,179,71,.3);border-radius:8px;padding:10px 16px;font-size:12px;color:#ffb347;display:none;align-items:center;gap:12px;z-index:200;white-space:nowrap;}
#undoBar.show{display:flex;animation:fadeSlide .2s ease;}
#undoBar button{background:transparent;border:1px solid rgba(255,179,71,.3);border-radius:5px;color:#ffb347;padding:3px 10px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:11px;letter-spacing:.5px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:300;}
.toast.show{opacity:1;}
.toast.ok{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);color:var(--c2);}
.toast.err{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2);color:var(--c4);}

.empty{color:var(--t3);font-size:12px;padding:24px;text-align:center;letter-spacing:.5px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-orb"><div class="login-orb-dot"></div></div>
    <div class="login-title">SIMUSPHERE</div>
    <div class="login-sub">ADMIN · RESTRICTED ACCESS</div>
    <input type="password" id="pwInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">SIGN IN</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo">
        <div class="tb-orb"><div class="tb-orb-dot"></div></div>
        <div class="tb-name">SimuSphere</div>
      </div>
      <div class="tb-div"></div>
      <div class="tb-page" id="tbPage">Dashboard</div>
    </div>
    <div class="tb-right">
      <div class="live-pill"><div class="live-dot"></div>Live</div>
      <button class="sign-out" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="shell">
    <div class="sb">
      <div class="sb-sec">Overview</div>
      <button class="ni on" onclick="go('dashboard',this)"><i class="ti ti-layout-dashboard" aria-hidden="true"></i>Dashboard</button>
      <div class="sb-sec">Knowledge</div>
      <button class="ni" onclick="go('components',this)"><i class="ti ti-cpu" aria-hidden="true"></i>Components<span class="ni-badge" id="compCount">0</span></button>
      <button class="ni" onclick="go('add',this)"><i class="ti ti-plus" aria-hidden="true"></i>Add component</button>
      <button class="ni" onclick="go('pdf',this)"><i class="ti ti-file-upload" aria-hidden="true"></i>PDF import</button>
      <div class="sb-sec">System</div>
      <button class="ni" onclick="go('ai',this)"><i class="ti ti-adjustments-horizontal" aria-hidden="true"></i>AI settings</button>
      <button class="ni" onclick="go('security',this)"><i class="ti ti-shield-lock" aria-hidden="true"></i>Security</button>
      <div class="sb-spacer"></div>
      <div class="sb-status">
        <div class="sb-status-dot"></div>
        <div class="sb-status-txt">Live</div>
        <div class="sb-status-url">render.com</div>
      </div>
    </div>

    <div class="main" id="main">
      <div id="pageContent"></div>
    </div>
  </div>
</div>

<div id="undoBar"><span id="undoMsg">Deleted</span><button onclick="undoDelete()">Undo</button></div>
<div class="toast" id="toast"></div>

<script>
'use strict';
let pw='', allKB={}, deletedEntry=null, undoTimer=null;

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function safeAttr(s){return esc(s).replace(/'/g,'&#39;');}

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);
}

async function api(url,opts={}){
  return fetch(url,{...opts,headers:{'x-admin-password':pw,...(opts.headers||{})}});
}

// Auth
async function login(){
  const p=document.getElementById('pwInput').value;
  const err=document.getElementById('loginErr');
  err.textContent='';
  try{
    const r=await fetch('/admin/knowledge',{headers:{'x-admin-password':p}});
    if(r.status===401){err.textContent='Incorrect password.';return;}
    pw=p;
    document.getElementById('loginScreen').style.display='none';
    const app=document.getElementById('app');
    app.style.display='flex';app.style.flexDirection='column';
    loadAll();
  }catch{err.textContent='Connection error.';}
}
function logout(){
  pw='';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pwInput').value='';
}

function loadAll(){loadDashboard();loadKB();}

// Nav
function go(name,btn){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  btn.classList.add('on');
  const titles={dashboard:'Dashboard',components:'Components',add:'Add component',pdf:'PDF import',ai:'AI settings',security:'Security'};
  document.getElementById('tbPage').textContent=titles[name]||name;
  const c=document.getElementById('pageContent');
  c.style.opacity='0';
  setTimeout(()=>{
    renderPage(name,c);
    c.style.transition='opacity .2s ease';
    c.style.opacity='1';
  },80);
}

function renderPage(name,c){
  const pages={
    dashboard:renderDashboard,
    components:renderComponents,
    add:()=>renderForm(),
    pdf:renderPDF,
    ai:renderAI,
    security:renderSecurity,
  };
  c.innerHTML='';
  const div=document.createElement('div');
  div.className='page';
  c.appendChild(div);
  (pages[name]||renderDashboard)(div);
}

// Dashboard
async function loadDashboard(){}
async function renderDashboard(container){
  try{
    const [sr,kr]=await Promise.all([
      api('/admin/stats'),api('/admin/knowledge')
    ]);
    const stats=await sr.json();
    const kb=await kr.json();
    const compKeys=Object.keys(kb);
    const restricted=compKeys.filter(k=>kb[k]?.restrictToKB).length;

    container.innerHTML=`
    <div class="stats">
      <div class="sc b1"><div class="sc-shimmer"></div><i class="ti ti-message-circle sc-icon" aria-hidden="true"></i><div class="sc-n" data-to="${stats.total||0}">0</div><div class="sc-l">Total questions</div></div>
      <div class="sc b2"><div class="sc-shimmer"></div><i class="ti ti-cpu sc-icon" aria-hidden="true"></i><div class="sc-n" data-to="${compKeys.length}">0</div><div class="sc-l">Components</div></div>
      <div class="sc b3"><div class="sc-shimmer"></div><i class="ti ti-lock sc-icon" aria-hidden="true"></i><div class="sc-n" data-to="${restricted}">0</div><div class="sc-l">KB restricted</div></div>
      <div class="sc b4"><div class="sc-shimmer"></div><i class="ti ti-clock sc-icon" aria-hidden="true"></i><div class="sc-n" data-to="${(stats.recent||[]).length}">0</div><div class="sc-l">Recent questions</div></div>
    </div>
    <div class="g2">
      <div class="card">
        <div class="card-hd"><span><i class="ti ti-chart-bar" aria-hidden="true"></i>Most used</span>
          <div style="display:flex;gap:4px;">
            <button class="act" style="font-size:9px;padding:2px 8px;" onclick="clearStats()">Clear stats</button>
          </div>
        </div>
        ${renderBars(stats.components||{})}
      </div>
      <div class="card">
        <div class="card-hd"><i class="ti ti-clock" aria-hidden="true"></i>Recent questions</div>
        ${renderRecent(stats.recent||[])}
      </div>
    </div>`;
    animateNums(container);
    setTimeout(()=>animateBars(container),100);
  }catch(e){container.innerHTML='<div class="empty">Failed to load dashboard</div>';}
}

function renderBars(comps){
  const sorted=Object.entries(comps).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(!sorted.length)return '<div class="empty">No activity yet</div>';
  const max=sorted[0][1]||1;
  return sorted.map(([n,c],i)=>`
    <div class="br">
      <div class="br-nm" title="${esc(n)}">${esc(n)}</div>
      <div class="br-tr"><div class="br-fl ${i%2?'g':'c'}" data-w="${Math.round(c/max*100)}"></div></div>
      <div class="br-ct">${c}</div>
    </div>`).join('');
}

function renderRecent(qs){
  if(!qs.length)return '<div class="empty">No questions yet</div>';
  return qs.slice(0,5).map(q=>`
    <div class="qi">
      <div class="qi-comp">${esc(q.component)}</div>
      <div class="qi-text">${esc(q.question)}</div>
      <div class="qi-time">${new Date(q.time).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
    </div>`).join('');
}

function animateNums(c){
  c.querySelectorAll('[data-to]').forEach(el=>{
    const target=parseInt(el.dataset.to)||0;
    let n=0;const step=Math.max(1,Math.ceil(target/30));
    const t=setInterval(()=>{n=Math.min(n+step,target);el.textContent=n;if(n>=target)clearInterval(t);},25);
  });
}
function animateBars(c){
  c.querySelectorAll('.br-fl[data-w]').forEach(el=>{el.style.width=el.dataset.w+'%';});
}

async function clearStats(){
  if(!confirm('Clear all statistics?'))return;
  const r=await api('/admin/stats',{method:'DELETE'});
  if(r.ok){toast('Statistics cleared');go('dashboard',document.querySelector('.ni.on'));}
  else toast('Failed','err');
}

// Components
async function loadKB(){
  try{
    const r=await api('/admin/knowledge');
    allKB=await r.json();
    document.getElementById('compCount').textContent=Object.keys(allKB).length;
  }catch{}
}

function renderComponents(container){
  const keys=Object.keys(allKB);
  container.innerHTML=`
    <div class="card">
      <div class="card-hd">
        <span><i class="ti ti-database" aria-hidden="true"></i>${keys.length} component${keys.length!==1?'s':''}</span>
        <div style="display:flex;gap:5px;">
          <button class="act" onclick="exportKB()">Export</button>
          <label style="cursor:pointer;"><span class="act" style="display:inline-block;">Import</span><input type="file" accept=".json" style="display:none" onchange="importKB(this)"></label>
        </div>
      </div>
      <div class="search-wrap">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input type="text" id="searchInput" placeholder="Search components..." oninput="filterComps(this.value)">
      </div>
      <div id="compRows">${renderCompRows(allKB)}</div>
    </div>`;
}

function renderCompRows(data){
  const keys=Object.keys(data);
  if(!keys.length)return '<div class="empty">No components yet — add one from the sidebar</div>';
  return keys.map((k,i)=>{
    const c=data[k];
    const bt=(c.buttons||[]).length;
    return `<div class="cr" style="animation-delay:${i*.04}s">
      <div>
        <div class="cr-name">${esc(k)}<span class="pill ${c.restrictToKB?'kb':'gen'}">${c.restrictToKB?'KB only':'General AI'}</span></div>
        <div class="cr-meta">${bt} quick button${bt!==1?'s':''}</div>
      </div>
      <div class="cr-acts">
        <button class="act cp" onclick="copyComp('${safeAttr(k)}')">Copy</button>
        <button class="act e" onclick="editComp('${safeAttr(k)}')">Edit</button>
        <button class="act d" onclick="deleteComp('${safeAttr(k)}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function filterComps(q){
  const filtered=Object.fromEntries(Object.entries(allKB).filter(([k])=>k.toLowerCase().includes(q.toLowerCase())));
  const rows=document.getElementById('compRows');
  if(rows)rows.innerHTML=renderCompRows(filtered);
}

        <div class="tog-s">AI answers only from knowledge above</div>
      </div>
      <label class="tog"><input type="checkbox" id="fRestrict" ${comp.restrictToKB?'checked':''}><span class="tog-sl"></span></label>

function goAdd(container){
  container.innerHTML=renderForm();
}

function renderPage2(name,c){
  if(name==='add'){c.innerHTML=renderForm();return;}
}

// Override renderPage for add
const _orig=renderPage;
window.renderPage=function(name,c){
  if(name==='add'){
    c.innerHTML='';
    const div=document.createElement('div');div.className='page';
    div.innerHTML=renderForm();c.appendChild(div);return;
  }

function addBtnItem(label='',question=''){
  const c=document.getElementById('btnItems');
  if(!c)return;
  const d=document.createElement('div');d.className='dyn-item';
  d.innerHTML=`<input type="text" placeholder="Button label" value="${safeAttr(label)}" style="flex:.8">
    <span class="dyn-sep">→</span>
    <input type="text" placeholder="Question to send" value="${safeAttr(question)}" style="flex:1.2">
    <button class="rm-btn" onclick="this.parentElement.remove()" aria-label="Remove">×</button>`;
  c.appendChild(d);
}

function getBtnItems(){
  return Array.from(document.querySelectorAll('#btnItems .dyn-item')).map(row=>{
    const inputs=row.querySelectorAll('input');
    return{label:inputs[0]?.value.trim()||'',question:inputs[1]?.value.trim()||''};
  }).filter(b=>b.label&&b.question);
}

function clearForm(){
  ['fName','fInfo'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const bi=document.getElementById('btnItems');if(bi)bi.innerHTML='';
  const r=document.getElementById('fRestrict');if(r)r.checked=false;
  const nc=document.getElementById('nameCC');if(nc)nc.textContent='0';
  const ic=document.getElementById('infoCC');if(ic)ic.textContent='0';
}

async function saveComp(){
  const name=(document.getElementById('fName')?.value||'').trim();
  if(!name){toast('Component name required','err');return;}
  const body={
    name,
    info:document.getElementById('fInfo')?.value.trim()||'',
    buttons:getBtnItems(),
    restrictToKB:document.getElementById('fRestrict')?.checked||false,
  };
  try{
    const r=await api('/admin/knowledge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(r.ok){
      toast('✓ Saved');
      await loadKB();
      go('components',document.querySelector('.ni[onclick*="components"]'));
    }else toast(d.error||'Save failed','err');
  }catch{toast('Network error','err');}
}

function editComp(name){
  const comp=allKB[name]||{};
  const c=document.getElementById('pageContent');
  c.style.opacity='0';
  setTimeout(()=>{
    c.innerHTML='';
    const div=document.createElement('div');div.className='page';
    div.innerHTML=renderForm(name,comp);c.appendChild(div);
    (comp.buttons||[]).forEach(b=>addBtnItem(b.label,b.question));
    document.getElementById('tbPage').textContent='Edit: '+name;
    document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
    document.querySelector('.ni[onclick*="add"]').classList.add('on');
    c.style.transition='opacity .2s';c.style.opacity='1';
  },80);
}

function copyComp(name){
  const comp=allKB[name]||{};
  editComp(name);
  setTimeout(()=>{
    const fn=document.getElementById('fName');
    if(fn){fn.value=name+' (Copy)';document.getElementById('nameCC').textContent=fn.value.length;}
    document.getElementById('tbPage').textContent='Copy of: '+name;
    toast('✓ Copied — edit and save');
  },150);
}

async function deleteComp(name){
  deletedEntry={name,data:allKB[name]};
  try{
    const r=await api('/admin/knowledge/'+encodeURIComponent(name),{method:'DELETE'});
    if(!r.ok){toast('Delete failed','err');deletedEntry=null;return;}
    await loadKB();
    renderCompRows2();
    showUndo('Deleted: '+name);
  }catch{toast('Network error','err');}
}

function renderCompRows2(){
  const rows=document.getElementById('compRows');
  if(rows)rows.innerHTML=renderCompRows(allKB);
  const cc=document.getElementById('compCount');
  if(cc)cc.textContent=Object.keys(allKB).length;
}

function showUndo(msg){
  const bar=document.getElementById('undoBar');
  document.getElementById('undoMsg').textContent=msg;
  bar.classList.add('show');
  clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>{bar.classList.remove('show');deletedEntry=null;},6000);
}

async function undoDelete(){
  if(!deletedEntry)return;
  document.getElementById('undoBar').classList.remove('show');
  try{
    await api('/admin/knowledge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:deletedEntry.name,...deletedEntry.data})});
    toast('✓ Restored: '+deletedEntry.name);
    deletedEntry=null;
    await loadKB();
    renderCompRows2();
  }catch{toast('Restore failed','err');}
}

// Export/Import
async function exportKB(){
  const r=await api('/admin/export');
  const blob=await r.blob();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='simusphere-kb.json';a.click();
  URL.revokeObjectURL(a.href);toast('✓ Exported');
}

async function importKB(input){
  const file=input.files[0];if(!file)return;
  try{
    const data=JSON.parse(await file.text());
    if(typeof data!=='object'||Array.isArray(data))throw new Error();
    const count=Object.keys(data).length;
    if(!confirm(`Import ${count} components? This replaces the current knowledge base.`)){input.value='';return;}
    const r=await api('/admin/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const res=await r.json();
    if(r.ok){toast(`✓ Imported ${res.count} components`);await loadKB();renderCompRows2();}
    else toast(res.error||'Import failed','err');
  }catch{toast('Invalid JSON file','err');}
  input.value='';
}

// PDF
function renderPDF(container){
  container.innerHTML=`
  <div class="form-card">
    <div class="form-title"><i class="ti ti-file-upload" aria-hidden="true"></i>PDF import</div>
    <label class="fl">Component name</label>
    <input type="text" id="pdfCompName" placeholder="e.g. Demister Pad">
    <label class="fl" style="margin-top:14px;">Upload PDF</label>
    <div class="pdf-zone" id="pdfDrop">
      <input type="file" accept=".pdf" id="pdfInput" onchange="handlePDF(this)">
      <i class="ti ti-file-text pdf-icon" aria-hidden="true"></i>
      <div class="pdf-lbl">Drop PDF here or click to browse</div>
      <div class="pdf-sub">AI will extract knowledge and quick buttons automatically</div>
    </div>
    <div class="pdf-prog" id="pdfProg">
      <div class="pdf-bar-wrap"><div class="pdf-bar" id="pdfBar"></div></div>
      <div class="pdf-status" id="pdfStatus">Processing...</div>
    </div>
    <div id="pdfResult"></div>
  </div>`;
  const drop=document.getElementById('pdfDrop');
  ['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('drag');}));
  ['dragleave','drop'].forEach(e=>drop.addEventListener(e,()=>drop.classList.remove('drag')));
}

async function handlePDF(input){
  const file=input.files[0];if(!file)return;
  const name=(document.getElementById('pdfCompName')?.value||'').trim();
  if(!name){toast('Enter component name first','err');input.value='';return;}
  const prog=document.getElementById('pdfProg');
  const bar=document.getElementById('pdfBar');
  const status=document.getElementById('pdfStatus');
  prog.classList.add('show');bar.style.width='15%';status.textContent='Reading PDF...';
  try{
    const ab=await file.arrayBuffer();
    const raw=new TextDecoder('utf-8',{fatal:false}).decode(new Uint8Array(ab));
    let text='';
    for(const m of raw.matchAll(/\(([^)]{1,500})\)/g)){
      const chunk=m[1].replace(/\\n/g,' ').replace(/\\/g,'').trim();
      if(chunk.length>3)text+=chunk+' ';
      if(text.length>12000)break;
    }
    if(!text.trim()){toast('Could not extract text — use a text-based PDF','err');prog.classList.remove('show');input.value='';return;}
    bar.style.width='45%';status.textContent='AI analyzing...';
    const r=await api('/admin/extract-pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pdfText:text,componentName:name})});
    const result=await r.json();
    if(!r.ok||!result.data){toast(result.error||'Extraction failed','err');prog.classList.remove('show');input.value='';return;}
    bar.style.width='100%';status.textContent='Done!';
    const d=result.data;
    document.getElementById('pdfResult').innerHTML=`
      <div class="pdf-ok"><i class="ti ti-check" aria-hidden="true"></i>Extracted successfully — review and save</div>`;
    setTimeout(()=>{
      prog.classList.remove('show');
      const comp={info:d.info||'',buttons:d.buttons||[],restrictToKB:false};
      const c=document.getElementById('pageContent');
      c.style.opacity='0';
      setTimeout(()=>{
        c.innerHTML='';
        const div=document.createElement('div');div.className='page';
        div.innerHTML=renderForm(name,comp);c.appendChild(div);
        (d.buttons||[]).forEach(b=>addBtnItem(b.label,b.question));
        document.getElementById('tbPage').textContent='Review: '+name;
        document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
        document.querySelector('.ni[onclick*="add"]').classList.add('on');
        c.style.transition='opacity .2s';c.style.opacity='1';
        toast('✓ PDF extracted — review and save');
      },400);
    },800);
  }catch(e){console.error(e);toast('Failed to process PDF','err');prog.classList.remove('show');}
  input.value='';
}

async function changePassword(){
  const np=document.getElementById('newPass')?.value||'';
  const cp=document.getElementById('confirmPass')?.value||'';
  if(np.length<6){toast('Min 6 characters','err');return;}
  if(np!==cp){toast('Passwords do not match','err');return;}
  try{
    const r=await api('/admin/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({newPassword:np})});
    if(r.ok){pw=np;document.getElementById('newPass').value='';document.getElementById('confirmPass').value='';toast('✓ Password updated');}
    else{const d=await r.json();toast(d.error||'Failed','err');}
  }catch{toast('Network error','err');}
}
